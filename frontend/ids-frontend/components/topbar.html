<!-- Orion — Top Navigation Bar -->
<header class="topbar" id="topbar">
  <div class="topbar__left">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect y="3" width="20" height="2" rx="1" fill="currentColor"/>
        <rect y="9" width="20" height="2" rx="1" fill="currentColor"/>
        <rect y="15" width="20" height="2" rx="1" fill="currentColor"/>
      </svg>
    </button>
    <div class="topbar__logo">
      <svg class="logo-icon" width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="12" stroke="var(--accent)" stroke-width="1.5"/>
        <circle cx="14" cy="14" r="6" stroke="var(--accent)" stroke-width="1.5"/>
        <circle cx="14" cy="14" r="2" fill="var(--accent)"/>
        <line x1="14" y1="0" x2="14" y2="6" stroke="var(--accent)" stroke-width="1" opacity="0.5"/>
        <line x1="14" y1="22" x2="14" y2="28" stroke="var(--accent)" stroke-width="1" opacity="0.5"/>
        <line x1="0" y1="14" x2="6" y2="14" stroke="var(--accent)" stroke-width="1" opacity="0.5"/>
        <line x1="22" y1="14" x2="28" y2="14" stroke="var(--accent)" stroke-width="1" opacity="0.5"/>
      </svg>
      <span class="logo-text">Orion</span>
    </div>
  </div>

  <div class="topbar__center">
    <div class="topbar__search">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="11" y1="11" x2="15" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search threats, IPs, logs…" autocomplete="off">
      <kbd class="search-kbd">/</kbd>
    </div>
  </div>

  <div class="topbar__right">
    <button class="topbar__icon-btn" id="notifBtn" aria-label="Notifications">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M10 2C7.24 2 5 4.24 5 7v3.59L3.59 12A2 2 0 005 15h10a2 2 0 001.41-3L15 10.59V7c0-2.76-2.24-5-5-5z" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <path d="M8 15a2 2 0 004 0" stroke="currentColor" stroke-width="1.5" fill="none"/>
      </svg>
      <span class="notif-badge" id="notifBadge">3</span>
    </button>
    <div class="topbar__user" id="userMenu">
      <div class="user-avatar">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="6" r="3.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M2 16.5c0-3.5 3-5.5 7-5.5s7 2 7 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="user-name">Operator</span>
    </div>
  </div>
</header>
