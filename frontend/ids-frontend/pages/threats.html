<!-- Orion — Threat Detection Page -->

<section class="stats-grid" id="statsGrid">
  <div class="stat-card">
    <div class="stat-card__header">
      <span class="stat-card__label">Active Threats</span>
      <div class="stat-card__icon stat-card__icon--red">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2L18 17H2L10 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
          <line x1="10" y1="8" x2="10" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="10" cy="14.5" r="0.8" fill="currentColor"/>
        </svg>
      </div>
    </div>
    <div class="stat-card__value" data-target="12">0</div>
    <div class="stat-card__meta">
      <span class="stat-trend stat-trend--down"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 3v6m0 0l3-3M6 9L3 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> 15%</span>
      <span class="stat-period">vs yesterday</span>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-card__header">
      <span class="stat-card__label">Blocked Attacks</span>
      <div class="stat-card__icon stat-card__icon--green">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2L2 6v5c0 4 3.5 7.5 8 8.5 4.5-1 8-4.5 8-8.5V6L10 2z" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7 10l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
    <div class="stat-card__value" data-target="847">0</div>
    <div class="stat-card__meta">
      <span class="stat-trend stat-trend--up"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 9V3m0 0L3 6m3-3l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> 4.2%</span>
      <span class="stat-period">last 24h</span>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-card__header">
      <span class="stat-card__label">Signatures Updated</span>
      <div class="stat-card__icon stat-card__icon--blue">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="2" width="14" height="16" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="6" y1="6" x2="14" y2="6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="6" y1="9" x2="14" y2="9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="6" y1="12" x2="11" y2="12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </div>
    </div>
    <div class="stat-card__value" data-target="14892">0</div>
    <div class="stat-card__meta">
      <span class="stat-trend stat-trend--neutral">Current</span>
      <span class="stat-period">database v4.8.2</span>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-card__header">
      <span class="stat-card__label">False Positive Rate</span>
      <div class="stat-card__icon stat-card__icon--purple">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7 10l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
    <div class="stat-card__value stat-card__value--health" data-target="2.1">0</div>
    <div class="stat-card__meta">
      <span class="stat-trend stat-trend--down"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 3v6m0 0l3-3M6 9L3 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> 0.3%</span>
      <span class="stat-period">improving</span>
    </div>
  </div>
</section>

<section class="viz-grid">
  <div class="viz-card" id="threatRadarCard">
    <div class="viz-card__header">
      <h2 class="viz-card__title">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.2" fill="none"/><circle cx="8" cy="8" r="4.5" stroke="currentColor" stroke-width="0.8" opacity="0.5" fill="none"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="0.8" opacity="0.3" fill="none"/><line x1="8" y1="8" x2="8" y2="1" stroke="currentColor" stroke-width="1" opacity="0.6"/></svg>
        Threat Radar
      </h2>
      <span class="viz-card__count" id="radarThreatCount">5 active</span>
    </div>
    <div class="viz-card__body viz-card__body--canvas viz-card__body--square">
      <canvas id="threatRadarCanvas"></canvas>
    </div>
  </div>
  <div class="viz-card" id="securityGaugeCard">
    <div class="viz-card__header">
      <h2 class="viz-card__title">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1L2 4v4c0 3.5 2.5 6.5 6 7.5 3.5-1 6-4 6-7.5V4L8 1z" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M5.5 8l2 2 3.5-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Security Score
      </h2>
    </div>
    <div class="viz-card__body viz-card__body--gauge">
      <canvas id="securityGaugeCanvas"></canvas>
      <div class="gauge-label">
        <span class="gauge-value" id="gaugeValue">0</span>
        <span class="gauge-unit">/ 100</span>
      </div>
    </div>
  </div>
</section>

<section class="charts-grid" style="margin-top: 0;">
  <div class="chart-card" id="threatChart">
    <div class="chart-card__header">
      <h2 class="chart-card__title">Threat Detection Timeline</h2>
      <div class="chart-card__controls">
        <button class="chart-tab chart-tab--active" data-range="24h">24H</button>
        <button class="chart-tab" data-range="7d">7D</button>
        <button class="chart-tab" data-range="30d">30D</button>
      </div>
    </div>
    <div class="chart-card__body">
      <canvas id="threatCanvas"></canvas>
    </div>
  </div>
  <div class="chart-card" id="trafficChart">
    <div class="chart-card__header">
      <h2 class="chart-card__title">Attack Vector Distribution</h2>
      <div class="chart-card__controls">
        <button class="chart-tab chart-tab--active" data-range="7d">7D</button>
        <button class="chart-tab" data-range="30d">30D</button>
      </div>
    </div>
    <div class="chart-card__body">
      <canvas id="trafficCanvas"></canvas>
    </div>
  </div>
</section>
