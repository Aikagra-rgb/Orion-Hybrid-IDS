<!-- Orion — Logs Page -->

<div class="viz-card viz-card--wide" id="logStreamCard" style="margin-bottom: 24px;">
  <div class="viz-card__header">
    <h2 class="viz-card__title">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="1" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.2" fill="none"/>
        <path d="M4 5l2.5 2.5L4 10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="8" y1="10" x2="12" y2="10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Live Log Stream
    </h2>
    <div class="log-controls">
      <button class="viz-btn" id="logPauseBtn" aria-label="Pause logs">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="3" y="2" width="3" height="10" rx="0.5" fill="currentColor"/>
          <rect x="8" y="2" width="3" height="10" rx="0.5" fill="currentColor"/>
        </svg>
      </button>
      <button class="viz-btn" id="logClearBtn" aria-label="Clear logs">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <line x1="3" y1="3" x2="11" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="11" y1="3" x2="3" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="log-stream log-stream--tall" id="logStream"></div>
</div>
